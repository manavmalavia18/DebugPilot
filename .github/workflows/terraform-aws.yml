name: Terraform AWS Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  aws-cluster:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/aws/cluster

    env:
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_argocd_github_webhook_secret: ${{ secrets.ARGOCD_GITHUB_WEBHOOK_SECRET }}
      TF_VAR_github_client_id: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
      TF_VAR_github_client_secret: ${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Update kubeconfig if cluster exists
        run: |
          if aws eks describe-cluster --region ${{ secrets.AWS_REGION }} --name debugpilot >/dev/null 2>&1; then
            aws eks update-kubeconfig \
              --region ${{ secrets.AWS_REGION }} \
              --name debugpilot
          else
            echo "EKS cluster does not exist yet. Skipping kubeconfig update."
          fi

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          if [ "${{ inputs.action }}" = "apply" ] && [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "Missing ANTHROPIC_API_KEY GitHub secret — required to create debugpilot-secrets on apply."
            exit 1
          fi
          terraform plan -input=false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Cleanup AWS ingress DNS before destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ github.workspace }}
        run: |
          if kubectl get ns >/dev/null 2>&1; then
            echo "Deleting AWS ingress resources so ExternalDNS can remove Cloudflare records..."

            kubectl delete -f k8s/ingress/aws/debugpilot-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/aws/grafana-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/aws/argocd-ingress.yaml --ignore-not-found || true

            echo "Waiting for ExternalDNS sync..."
            sleep 90

            kubectl logs -n external-dns deploy/external-dns --tail=100 || true
          else
            echo "Cluster not reachable. Skipping ingress DNS cleanup."
          fi

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false