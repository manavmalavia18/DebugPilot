name: Terraform GCP Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  gcp-cluster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/gcp

    env:
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_gcp_region: ${{ secrets.GCP_REGION }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_argocd_github_webhook_secret: ${{ secrets.ARGOCD_GITHUB_WEBHOOK_SECRET }}
      TF_VAR_github_client_id: ${{ secrets.DEBUGPILOT_OAUTH_CLIENT_ID_GCP }}
      TF_VAR_github_client_secret: ${{ secrets.DEBUGPILOT_OAUTH_CLIENT_SECRET_GCP }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Update kubeconfig if cluster exists
        run: |
          if gcloud container clusters describe debugpilot \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            gcloud container clusters get-credentials debugpilot \
              --region "${{ secrets.GCP_REGION }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          else
            echo "GKE cluster does not exist yet. Skipping kubeconfig update."
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          if [ "${{ inputs.action }}" = "apply" ] && [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "Missing ANTHROPIC_API_KEY GitHub secret — required to create debugpilot-secrets on apply."
            exit 1
          fi
          terraform plan -input=false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Cleanup GCP ingress DNS before destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ github.workspace }}
        run: |
          if kubectl get ns >/dev/null 2>&1; then
            echo "Deleting GCP ingress resources so ExternalDNS can remove Cloudflare records..."

            kubectl delete -f k8s/ingress/gcp/debugpilot-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/gcp/grafana-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/gcp/argocd-ingress.yaml --ignore-not-found || true

            echo "Waiting for ExternalDNS sync..."
            sleep 90

            kubectl logs -n external-dns deploy/external-dns --tail=100 || true
          else
            echo "Cluster not reachable. Skipping ingress DNS cleanup."
          fi

      - name: Detach Cloud SQL networking from Terraform state
        if: inputs.action == 'destroy'
        run: |
          if gcloud sql instances describe debugpilot-postgres \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            echo "Cloud SQL instance exists — keeping it and VPC peering in GCP; removing from Terraform state."
            terraform state rm google_sql_user.debugpilot 2>/dev/null || true
            terraform state rm google_sql_database.debugpilot 2>/dev/null || true
            terraform state rm google_sql_database_instance.postgres 2>/dev/null || true
            terraform state rm random_password.db 2>/dev/null || true
            terraform state rm google_service_networking_connection.sql_private_vpc 2>/dev/null || true
            terraform state rm google_compute_global_address.sql_private_range 2>/dev/null || true
            terraform state rm module.network.google_compute_subnetwork.main 2>/dev/null || true
            terraform state rm module.network.google_compute_network.main 2>/dev/null || true
          fi

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          REFRESH_FLAG=""
          if gcloud sql instances describe debugpilot-postgres \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            REFRESH_FLAG="-refresh=false"
            echo "Using destroy with -refresh=false (Cloud SQL retained)."
          fi
          terraform destroy -auto-approve -input=false $REFRESH_FLAG || {
            echo "Destroy finished with errors — OK if Cloud SQL peering was kept."
            if ! gcloud container clusters describe debugpilot \
              --region "${{ secrets.GCP_REGION }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              echo "GKE cluster is gone — shutdown succeeded."
              exit 0
            fi
            exit 1
          }
