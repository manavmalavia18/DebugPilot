name: Terraform GCP Cluster

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  gcp-cluster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/gcp

    env:
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_gcp_region: ${{ secrets.GCP_REGION }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_argocd_github_webhook_secret: ${{ secrets.ARGOCD_GITHUB_WEBHOOK_SECRET }}
      TF_VAR_github_client_id: ${{ secrets.DEBUGPILOT_OAUTH_CLIENT_ID_GCP }}
      TF_VAR_github_client_secret: ${{ secrets.DEBUGPILOT_OAUTH_CLIENT_SECRET_GCP }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Update kubeconfig if cluster exists
        run: |
          if gcloud container clusters describe debugpilot \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            gcloud container clusters get-credentials debugpilot \
              --region "${{ secrets.GCP_REGION }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          else
            echo "GKE cluster does not exist yet. Skipping kubeconfig update."
          fi

      - name: Start Cloud SQL before apply
        if: inputs.action == 'apply'
        run: |
          INSTANCE=debugpilot-postgres
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if ! gcloud sql instances describe "$INSTANCE" --project="$PROJECT" >/dev/null 2>&1; then
            echo "No existing Cloud SQL — apply will create one."
            exit 0
          fi
          STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)')
          if [ "$STATE" = "RUNNABLE" ]; then
            echo "Cloud SQL already RUNNABLE."
            exit 0
          fi
          echo "Starting Cloud SQL (was $STATE)..."
          gcloud sql instances patch "$INSTANCE" \
            --project="$PROJECT" \
            --activation-policy=ALWAYS \
            --quiet
          for i in $(seq 1 36); do
            STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)')
            echo "  state=$STATE"
            if [ "$STATE" = "RUNNABLE" ]; then
              echo "Cloud SQL is RUNNABLE."
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for Cloud SQL to become RUNNABLE."
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Import existing Cloud SQL and network
        if: inputs.action == 'apply'
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          REGION="${{ secrets.GCP_REGION }}"
          INSTANCE=debugpilot-postgres

          import_if_missing() {
            if ! terraform state show "$1" >/dev/null 2>&1; then
              echo "Importing $1"
              terraform import "$1" "$2" || true
            fi
          }

          if gcloud sql instances describe "$INSTANCE" --project="$PROJECT" >/dev/null 2>&1; then
            import_if_missing google_sql_database_instance.postgres "$PROJECT/$INSTANCE"
            import_if_missing google_sql_database.debugpilot "$PROJECT/$INSTANCE/debugpilot"
            import_if_missing google_sql_user.debugpilot "debugpilot//${INSTANCE}"
          fi
          if gcloud compute networks describe debugpilot-vpc --project="$PROJECT" >/dev/null 2>&1; then
            import_if_missing module.network.google_compute_network.main "projects/$PROJECT/global/networks/debugpilot-vpc"
            import_if_missing module.network.google_compute_subnetwork.main "projects/$PROJECT/regions/$REGION/subnetworks/debugpilot-subnet"
          fi
          if gcloud compute addresses describe debugpilot-sql-private-ip --global --project="$PROJECT" >/dev/null 2>&1; then
            import_if_missing google_compute_global_address.sql_private_range "projects/$PROJECT/global/addresses/debugpilot-sql-private-ip"
          fi
          import_if_missing google_service_networking_connection.sql_private_vpc \
            "projects/$PROJECT/global/networks/debugpilot-vpc:servicenetworking.googleapis.com"

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          if [ "${{ inputs.action }}" = "apply" ] && [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "Missing ANTHROPIC_API_KEY GitHub secret — required to create debugpilot-secrets on apply."
            exit 1
          fi
          terraform plan -input=false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          PROJECT="$GCP_PROJECT_ID"
          REGION="$GCP_REGION"
          CLUSTER=debugpilot
          ZONES=(us-central1-a us-central1-f us-central1-c us-central1-b)

          delete_partial_cluster() {
            if gcloud container clusters describe "$CLUSTER" \
              --region="$REGION" --project="$PROJECT" >/dev/null 2>&1; then
              echo "Deleting failed cluster before retry..."
              gcloud container clusters delete "$CLUSTER" \
                --region="$REGION" --project="$PROJECT" --quiet --async || true
              for _ in $(seq 1 60); do
                gcloud container clusters describe "$CLUSTER" \
                  --region="$REGION" --project="$PROJECT" >/dev/null 2>&1 || return 0
                sleep 10
              done
            fi
          }

          for zone in "${ZONES[@]}"; do
            echo "=== Trying node_locations=[$zone] ==="
            export TF_VAR_node_locations="[\"$zone\"]"
            LOG="$(mktemp)"
            set +e
            terraform apply -auto-approve -input=false 2>&1 | tee "$LOG"
            STATUS=${PIPESTATUS[0]}
            set -e
            if [ "$STATUS" -eq 0 ]; then
              echo "Apply succeeded in $zone"
              exit 0
            fi
            if ! grep -qE 'GCE_STOCKOUT|does not have enough resources available' "$LOG"; then
              echo "Apply failed (not a stockout) — stopping."
              exit "$STATUS"
            fi
            echo "Zone $zone stockout — trying next zone..."
            rm -f "$LOG"
            delete_partial_cluster
          done
          echo "All zones out of capacity."
          exit 1

      - name: Cleanup GCP ingress DNS before destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ github.workspace }}
        run: |
          if kubectl get ns >/dev/null 2>&1; then
            echo "Deleting GCP ingress resources so ExternalDNS can remove Cloudflare records..."

            kubectl delete -f k8s/ingress/gcp/debugpilot-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/gcp/grafana-ingress.yaml --ignore-not-found || true
            kubectl delete -f k8s/ingress/gcp/argocd-ingress.yaml --ignore-not-found || true

            echo "Waiting for ExternalDNS sync..."
            sleep 90

            kubectl logs -n external-dns deploy/external-dns --tail=100 || true
          else
            echo "Cluster not reachable. Skipping ingress DNS cleanup."
          fi

      - name: Detach Cloud SQL networking from Terraform state
        if: inputs.action == 'destroy'
        run: |
          if gcloud sql instances describe debugpilot-postgres \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            echo "Cloud SQL instance exists — keeping it and VPC peering in GCP; removing from Terraform state."
            terraform state rm google_sql_user.debugpilot 2>/dev/null || true
            terraform state rm google_sql_database.debugpilot 2>/dev/null || true
            terraform state rm google_sql_database_instance.postgres 2>/dev/null || true
            terraform state rm random_password.db 2>/dev/null || true
            terraform state rm google_service_networking_connection.sql_private_vpc 2>/dev/null || true
            terraform state rm google_compute_global_address.sql_private_range 2>/dev/null || true
            terraform state rm module.network.google_compute_subnetwork.main 2>/dev/null || true
            terraform state rm module.network.google_compute_network.main 2>/dev/null || true
          fi

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          REFRESH_FLAG=""
          if gcloud sql instances describe debugpilot-postgres \
            --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
            REFRESH_FLAG="-refresh=false"
            echo "Using destroy with -refresh=false (Cloud SQL retained)."
          fi
          terraform destroy -auto-approve -input=false $REFRESH_FLAG || {
            echo "Destroy finished with errors — OK if Cloud SQL peering was kept."
            if ! gcloud container clusters describe debugpilot \
              --region "${{ secrets.GCP_REGION }}" \
              --project "${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; then
              echo "GKE cluster is gone — shutdown succeeded."
              exit 0
            fi
            exit 1
          }

      - name: Stop Cloud SQL after destroy
        if: inputs.action == 'destroy'
        run: |
          INSTANCE=debugpilot-postgres
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          if ! gcloud sql instances describe "$INSTANCE" --project="$PROJECT" >/dev/null 2>&1; then
            echo "No Cloud SQL instance to stop."
            exit 0
          fi
          STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)')
          if [ "$STATE" = "STOPPED" ]; then
            echo "Cloud SQL already STOPPED."
            exit 0
          fi
          echo "Stopping Cloud SQL to save cost..."
          gcloud sql instances patch "$INSTANCE" \
            --project="$PROJECT" \
            --activation-policy=NEVER \
            --quiet
          for i in $(seq 1 30); do
            STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)')
            echo "  state=$STATE"
            if [ "$STATE" = "STOPPED" ]; then
              echo "Cloud SQL stopped. Idle cost ~\$2/mo storage."
              exit 0
            fi
            sleep 20
          done
          echo "Stop requested — instance may still be stopping."
