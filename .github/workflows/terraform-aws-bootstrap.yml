name: Terraform AWS Foundation

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply

jobs:
  aws-foundation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/aws/bootstrap

    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Adopt existing ECR/S3 if already in AWS
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          # Idempotent: skip when already in state or resource does not exist yet
          terraform import aws_ecr_repository.api debugpilot-api 2>/dev/null || true
          terraform import aws_s3_bucket.log_uploads "debugpilot-log-uploads-${AWS_ACCOUNT_ID}" 2>/dev/null || true

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -input=false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false
