name: Deploy

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Which cloud to deploy to"
        required: true
        type: choice
        options:
          - aws
          - gcp
          - both
      image_tag:
        description: "Image tag to deploy (leave empty to use latest from registry)"
        required: false
        default: ""

jobs:
  deploy-aws:
    if: inputs.cloud == 'aws' || inputs.cloud == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --name debugpilot \
            --region ${{ secrets.AWS_REGION }}

      - name: Sync Anthropic API secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Missing ANTHROPIC_API_KEY GitHub secret — required for DebugPilot analyze endpoint."
            exit 1
          fi
          kubectl create secret generic debugpilot-secrets \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve image tag
        id: resolve_tag_aws
        run: |
          if [ -z "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG=$(aws ecr describe-images \
              --repository-name debugpilot-api \
              --region ${{ secrets.AWS_REGION }} \
              --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[1]' \
              --output text)
            echo "Using latest ECR tag: $IMAGE_TAG"
          else
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "Using provided tag: $IMAGE_TAG"
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EKS
        env:
          IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/debugpilot-api:${{ steps.resolve_tag_aws.outputs.image_tag }}
        run: |
          echo "Deploying image tag: ${{ steps.resolve_tag_aws.outputs.image_tag }}"
          if helm status debugpilot -n default >/dev/null 2>&1; then
            helm upgrade --install debugpilot ./charts/debugpilot \
              --set api.image="$IMAGE"
          else
            echo "No Helm release — app is managed by ArgoCD. Patching deployment image..."
            kubectl set image deployment/debugpilot-api debugpilot-api="$IMAGE"
          fi
          kubectl rollout restart deployment/debugpilot-api
          kubectl rollout status deployment/debugpilot-api --timeout=180s
          kubectl wait --for=condition=ready pod -l app=debugpilot-api --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get deployment debugpilot-api
          kubectl get pods -l app=debugpilot-api

  deploy-gcp:
    if: inputs.cloud == 'gcp' || inputs.cloud == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubectl for GKE
        run: |
          gcloud container clusters get-credentials debugpilot \
            --region=${{ secrets.GCP_REGION }}

      - name: Sync Anthropic API secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Missing ANTHROPIC_API_KEY GitHub secret — required for DebugPilot analyze endpoint."
            exit 1
          fi
          kubectl create secret generic debugpilot-secrets \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve image tag
        id: resolve_tag_gcp
        run: |
          if [ -z "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG=$(gcloud artifacts docker images list \
              us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/debugpilot/debugpilot-api \
              --sort-by=~UPDATE_TIME \
              --limit=1 \
              --format='value(tags)' | head -1)
            echo "Using latest GAR tag: $IMAGE_TAG"
          else
            IMAGE_TAG="${{ inputs.image_tag }}"
            echo "Using provided tag: $IMAGE_TAG"
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to GKE
        env:
          IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/debugpilot/debugpilot-api:${{ steps.resolve_tag_gcp.outputs.image_tag }}
        run: |
          echo "Deploying image tag: ${{ steps.resolve_tag_gcp.outputs.image_tag }}"
          if helm status debugpilot -n default >/dev/null 2>&1; then
            helm upgrade --install debugpilot ./charts/debugpilot \
              -f charts/debugpilot/values-gcp.yaml \
              --set api.image="$IMAGE" \
              --set api.replicas=1
          else
            echo "No Helm release — app is managed by ArgoCD. Patching deployment image..."
            kubectl set image deployment/debugpilot-api debugpilot-api="$IMAGE"
          fi
          kubectl rollout restart deployment/debugpilot-api
          kubectl rollout status deployment/debugpilot-api --timeout=180s
          kubectl wait --for=condition=ready pod -l app=debugpilot-api --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get deployment debugpilot-api
          kubectl get pods -l app=debugpilot-api
