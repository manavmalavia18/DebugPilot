name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "charts/debugpilot/values.yaml"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check app/ tests/

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Validate Helm chart
        run: |
          helm lint ./charts/debugpilot
          helm template debugpilot ./charts/debugpilot \
            --set api.image=example.com/debugpilot-api:test \
            > /dev/null

  build-and-push:
    needs: [test, lint, helm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Resolve image push targets
        id: image_targets
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/debugpilot-api"
          {
            echo "${ECR}:latest"
            echo "${ECR}:${{ github.sha }}"
          } > /tmp/image-tags.txt

          if gcloud artifacts repositories describe debugpilot \
            --location="${GCP_REGION}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            GAR="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/debugpilot/debugpilot-api"
            echo "${GAR}:latest" >> /tmp/image-tags.txt
            echo "${GAR}:${{ github.sha }}" >> /tmp/image-tags.txt
            echo "gar_push=true" >> "$GITHUB_OUTPUT"
            echo "gar_image=${GAR}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "gar_push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GAR repository debugpilot not found — pushing to ECR only. Run Terraform GCP Foundation apply to create it."
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/image-tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image_targets.outputs.tags }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|image:.*debugpilot-api.*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/debugpilot-api:${{ github.sha }}|" charts/debugpilot/values.yaml

          git config user.email "ci@debugpilot.dev"
          git config user.name "CI Bot"

          git add charts/debugpilot/values.yaml

          if git diff --cached --quiet; then
            echo "No image tag changes to commit."
            exit 0
          fi

          git commit -m "ci: update image tag to ${{ github.sha }}"

          git pull --rebase origin main
          git push origin main

      - name: Output image tags
        run: |
          echo "Image pushed:"
          echo "  ECR: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/debugpilot-api:${{ github.sha }}"
          if [ "${{ steps.image_targets.outputs.gar_push }}" = "true" ]; then
            echo "  GAR: ${{ steps.image_targets.outputs.gar_image }}"
          else
            echo "  GAR: skipped (run Terraform GCP Foundation to create debugpilot repository)"
          fi
