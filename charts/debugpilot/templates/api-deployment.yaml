apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugpilot-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: debugpilot-api
  template:
    metadata:
      labels:
        app: debugpilot-api
    spec:
      containers:
        - name: debugpilot-api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: {{ .Values.api.anthropicSecretKey }}
            {{- if and .Values.redis.enabled .Values.api.redisUrl }}
            - name: REDIS_URL
              value: {{ .Values.api.redisUrl | quote }}
            {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
