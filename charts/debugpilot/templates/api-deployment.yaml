apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugpilot-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: debugpilot-api
  template:
    metadata:
      labels:
        app: debugpilot-api
    spec:
      serviceAccountName: debugpilot-api
      {{- if .Values.api.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: debugpilot-api-data
      {{- end }}
      containers:
        - name: debugpilot-api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: {{ .Values.api.anthropicSecretKey }}
            {{- if and .Values.redis.enabled .Values.api.redisUrl }}
            - name: REDIS_URL
              value: {{ .Values.api.redisUrl | quote }}
            {{- end }}
            {{- if .Values.api.publicBaseUrl }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.api.publicBaseUrl | quote }}
            {{- end }}
            {{- if .Values.api.authCookieSecure }}
            - name: AUTH_COOKIE_SECURE
              value: "true"
            {{- end }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: JWT_SECRET
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: DATABASE_URL
                  optional: true
            {{- if .Values.api.uploadsS3Bucket }}
            - name: UPLOADS_S3_BUCKET
              value: {{ .Values.api.uploadsS3Bucket | quote }}
            - name: AWS_REGION
              value: {{ .Values.api.awsRegion | default "us-east-1" | quote }}
            {{- end }}
            {{- if .Values.api.persistence.enabled }}
            - name: DATABASE_PATH
              value: {{ .Values.api.persistence.databasePath | quote }}
            {{- end }}
          {{- if .Values.api.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.api.persistence.mountPath }}
          {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
