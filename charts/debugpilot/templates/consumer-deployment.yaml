{{- if .Values.consumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debugpilot-consumer
spec:
  replicas: {{ .Values.consumer.replicas }}
  selector:
    matchLabels:
      app: debugpilot-consumer
  template:
    metadata:
      labels:
        app: debugpilot-consumer
    spec:
      containers:
        - name: debugpilot-consumer
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          command: {{ toJson .Values.consumer.command }}
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: {{ .Values.api.anthropicSecretKey }}
            {{- if and .Values.redis.enabled .Values.api.redisUrl }}
            - name: REDIS_URL
              value: {{ .Values.api.redisUrl | quote }}
            {{- end }}
            {{- if .Values.kafka.bootstrapServers }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- end }}
            - name: KAFKA_TOPIC_INCIDENTS
              value: {{ .Values.kafka.topicIncidents | quote }}
            - name: KAFKA_TOPIC_DLQ
              value: {{ .Values.kafka.topicDlq | quote }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.consumer.groupId | quote }}
            {{- if .Values.consumer.systemGithubId }}
            - name: DEBUGPILOT_SYSTEM_GITHUB_ID
              value: {{ .Values.consumer.systemGithubId | quote }}
            {{- end }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_CLIENT_ID
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_CLIENT_SECRET
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: JWT_SECRET
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: DATABASE_URL
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_WEBHOOK_SECRET
                  optional: true
            - name: GITHUB_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.anthropicSecretName }}
                  key: GITHUB_WEBHOOK_TOKEN
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
{{- end }}
