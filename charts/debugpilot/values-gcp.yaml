redis:
  enabled: true

api:
  # Updated by CI on main when GAR repository debugpilot exists (GCP_PROJECT_ID secret)
  image: us-central1-docker.pkg.dev/jobradar-497223/debugpilot/debugpilot-api:0da9025a5d7e6adfbb6813e02a8d17abc6d5f12b
  replicas: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 50
  port: 8000
  imagePullPolicy: Always
  serviceType: ClusterIP
  anthropicSecretName: debugpilot-secrets
  anthropicSecretKey: ANTHROPIC_API_KEY
  redisUrl: redis://redis:6379/0
  publicBaseUrl: https://debugpilot-gcp.manavmalavia.org
  authCookieSecure: true
  persistence:
    enabled: false
