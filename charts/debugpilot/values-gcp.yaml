redis:
  enabled: true

api:
  # Updated by CI on main when GAR repository debugpilot exists (GCP_PROJECT_ID secret)
  image: us-central1-docker.pkg.dev/jobradar-497223/debugpilot/debugpilot-api:33eb899c528b5ef7b215202c67443ad48331c7ce
  replicas: 1
  port: 8000
  imagePullPolicy: Always
  serviceType: ClusterIP
  anthropicSecretName: debugpilot-secrets
  anthropicSecretKey: ANTHROPIC_API_KEY
  redisUrl: redis://redis:6379/0
  publicBaseUrl: https://debugpilot-gcp.manavmalavia.org
  authCookieSecure: true
  persistence:
    enabled: true
    size: 1Gi
    mountPath: /app/data
    databasePath: /app/data/debugpilot.db
