redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

api:
  image: 565273632019.dkr.ecr.us-east-1.amazonaws.com/debugpilot-api:c72d634f035b310bf125d180ebd33bd4f7774d27
  replicas: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 50
  port: 8000
  nodePort: 30080
  imagePullPolicy: Always
  serviceType: ClusterIP
  anthropicSecretName: debugpilot-secrets
  anthropicSecretKey: ANTHROPIC_API_KEY
  redisUrl: redis://redis:6379/0
  publicBaseUrl: https://debugpilot.manavmalavia.org
  authCookieSecure: true
  uploadsS3Bucket: debugpilot-log-uploads-565273632019
  awsRegion: us-east-1
  persistence:
    enabled: false

kafka:
  bootstrapServers: ""
  topicIncidents: incidents.raw
  topicDlq: incidents.dlq

consumer:
  enabled: false
  replicas: 1
  groupId: debugpilot-incidents
  systemGithubId: ""
  command:
    - python
    - -m
    - app.consumer
