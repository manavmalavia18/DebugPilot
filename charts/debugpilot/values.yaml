redis:
  enabled: true
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

api:
  image: 565273632019.dkr.ecr.us-east-1.amazonaws.com/debugpilot-api:fbf0a29957369929792c170f7494ff13d74d0b2d
  replicas: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 50
  port: 8000
  nodePort: 30080
  imagePullPolicy: Always
  serviceType: ClusterIP
  anthropicSecretName: debugpilot-secrets
  anthropicSecretKey: ANTHROPIC_API_KEY
  redisUrl: redis://redis:6379/0
  publicBaseUrl: https://debugpilot.manavmalavia.org
  authCookieSecure: true
  uploadsS3Bucket: debugpilot-log-uploads-565273632019
  awsRegion: us-east-1
  persistence:
    enabled: false
